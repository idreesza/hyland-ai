name: Auto Update Platforms

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - run: npm ci
      
      - name: Check secrets loaded
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then echo "URL is EMPTY"; else echo "URL is set"; fi
          if [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then echo "KEY is EMPTY"; else echo "KEY is set"; fi
          if [ -z "$KIMI_API_KEY" ]; then echo "KIMI is EMPTY"; else echo "KIMI is set"; fi
      
      - name: Run auto-update script
        run: node scripts/auto-update.js

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update platforms"
          git push